name: Weekly listings refresh

# Runs every Friday at 11:00 UTC (~6:00 AM US Central), and can also be
# triggered by hand from the Actions tab ("Run workflow").
on:
  schedule:
    - cron: "0 11 * * 5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild listings from homes.com
        run: node scripts/refresh.mjs

      - name: Commit if the listings changed
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name "listings-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Weekly listings refresh"
            git push
            echo "Listings updated and pushed. Netlify will redeploy automatically."
          else
            echo "No listing changes this week."
          fi
